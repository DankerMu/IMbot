name: Implementation Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: implementation-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-config:
    name: Implementation Gate Config
    runs-on: ubuntu-latest
    outputs:
      node_static: ${{ steps.read.outputs.node_static }}
      node_integration: ${{ steps.read.outputs.node_integration }}
      android_static: ${{ steps.read.outputs.android_static }}
      android_instrumented: ${{ steps.read.outputs.android_instrumented }}
      has_node_root: ${{ steps.detect.outputs.has_node_root }}
      has_node_packages: ${{ steps.detect.outputs.has_node_packages }}
      has_android: ${{ steps.detect.outputs.has_android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read CI gate activation config
        id: read
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const path = ".github/ci-gates.json";
          const defaults = {
            node_static: false,
            node_integration: false,
            android_static: false,
            android_instrumented: false
          };
          const raw = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, "utf8")) : {};
          const merged = { ...defaults, ...raw };
          for (const [key, value] of Object.entries(merged)) {
            console.log(`${key}=${value ? "true" : "false"}`);
          }
          EOF

      - name: Detect implementation targets
        id: detect
        run: |
          if [[ -f package.json ]]; then
            echo "has_node_root=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node_root=false" >> "$GITHUB_OUTPUT"
          fi

          if find packages -maxdepth 2 -type f \( -path 'packages/relay/package.json' -o -path 'packages/companion/package.json' -o -path 'packages/wire/package.json' \) -print -quit | grep -q .; then
            echo "has_node_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node_packages=false" >> "$GITHUB_OUTPUT"
          fi

          if find packages/android -type f \( -name 'gradlew' -o -name 'settings.gradle' -o -name 'settings.gradle.kts' -o -name 'build.gradle' -o -name 'build.gradle.kts' \) -print -quit 2>/dev/null | grep -q .; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
          fi

  node-static-quality:
    name: Node Static Quality
    runs-on: ubuntu-latest
    needs: gate-config
    if: ${{ needs.gate-config.outputs.node_static == 'true' && needs.gate-config.outputs.has_node_root == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run Node static gate
        run: bash scripts/ci/run_node_static_gate.sh

      - name: Upload Node coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: node-coverage
          path: |
            coverage
            packages/*/coverage
          if-no-files-found: ignore

  node-integration:
    name: Node Integration
    runs-on: ubuntu-latest
    needs: gate-config
    if: ${{ needs.gate-config.outputs.node_integration == 'true' && needs.gate-config.outputs.has_node_packages == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run Node integration gate
        run: bash scripts/ci/run_node_integration_gate.sh

  android-static-quality:
    name: Android Static Quality
    runs-on: ubuntu-latest
    needs: gate-config
    if: ${{ needs.gate-config.outputs.android_static == 'true' && needs.gate-config.outputs.has_android == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
        with:
          min-wrapper-count: 1

      - name: Run Android static gate
        run: bash scripts/ci/run_android_static_gate.sh

      - name: Upload Android unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-reports
          path: |
            packages/android/**/build/reports
            packages/android/**/build/test-results
          if-no-files-found: ignore

  android-instrumented-smoke:
    name: Android Instrumented Smoke
    runs-on: ubuntu-latest
    needs: gate-config
    if: ${{ needs.gate-config.outputs.android_instrumented == 'true' && needs.gate-config.outputs.has_android == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run Android instrumented smoke gate
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_7
          script: bash scripts/ci/run_android_instrumented_gate.sh

      - name: Upload Android instrumentation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-instrumented-artifacts
          path: |
            packages/android/**/build/reports/androidTests
            packages/android/**/build/outputs/androidTest-results
          if-no-files-found: ignore
