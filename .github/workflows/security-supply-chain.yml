name: Security And Supply Chain

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "30 7 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: security-supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-config:
    name: Gate Config
    runs-on: ubuntu-latest
    outputs:
      codeql_javascript_typescript: ${{ steps.read.outputs.codeql_javascript_typescript }}
      codeql_kotlin: ${{ steps.read.outputs.codeql_kotlin }}
      has_js_ts: ${{ steps.detect.outputs.has_js_ts }}
      has_android_kotlin: ${{ steps.detect.outputs.has_android_kotlin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read CI gate activation config
        id: read
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const path = ".github/ci-gates.json";
          const defaults = {
            codeql_javascript_typescript: false,
            codeql_kotlin: false
          };
          const raw = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, "utf8")) : {};
          const merged = { ...defaults, ...raw };
          for (const [key, value] of Object.entries(merged)) {
            console.log(`${key}=${value ? "true" : "false"}`);
          }
          EOF

      - name: Detect code targets
        id: detect
        run: |
          if find packages -type f \( -name '*.ts' -o -name '*.js' \) -print -quit 2>/dev/null | grep -q .; then
            echo "has_js_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js_ts=false" >> "$GITHUB_OUTPUT"
          fi

          if find packages/android -type f \( -name '*.kt' -o -name '*.kts' -o -name 'build.gradle' -o -name 'build.gradle.kts' -o -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -print -quit 2>/dev/null | grep -q .; then
            echo "has_android_kotlin=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android_kotlin=false" >> "$GITHUB_OUTPUT"
          fi

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  codeql-javascript-typescript:
    name: CodeQL JavaScript/TypeScript
    needs: gate-config
    if: ${{ needs.gate-config.outputs.codeql_javascript_typescript == 'true' && needs.gate-config.outputs.has_js_ts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  codeql-kotlin:
    name: CodeQL Kotlin
    needs: gate-config
    if: ${{ needs.gate-config.outputs.codeql_kotlin == 'true' && needs.gate-config.outputs.has_android_kotlin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: kotlin

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
