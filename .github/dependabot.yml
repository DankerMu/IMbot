version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 2
    commit-message:
      prefix: "build(deps)"
    groups:
      github-actions-toolchain:
        patterns:
          - "actions/*"
          - "gradle/actions"
          - "reactivecircus/android-emulator-runner"
      github-actions-security:
        patterns:
          - "github/codeql-action"
