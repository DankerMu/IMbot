version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 1
    commit-message:
      prefix: "build(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
